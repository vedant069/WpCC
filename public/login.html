<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OliBot — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #3249d7, #6c63ff);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 26px;
            box-shadow: 0 8px 24px rgba(50, 73, 215, 0.4);
        }

        h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            margin-bottom: 32px;
        }

        label {
            display: block;
            text-align: left;
            color: rgba(255, 255, 255, 0.65);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .field {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        input:focus {
            border-color: rgba(50, 73, 215, 0.8);
            box-shadow: 0 0 0 3px rgba(50, 73, 215, 0.15);
        }

        button.primary {
            width: 100%;
            background: linear-gradient(135deg, #3249d7, #5a6cf0);
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 10px;
            padding: 13px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(50, 73, 215, 0.4);
            margin-top: 8px;
        }

        button.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(50, 73, 215, 0.5);
        }

        button.primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #ff7b7b;
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">🤖</div>
        <h1>OliBot</h1>
        <p class="subtitle">Sign in to your workspace</p>

        <div id="error-msg" class="error"></div>

        <div class="field">
            <label for="email-input">Email</label>
            <input id="email-input" type="email" placeholder="you@company.com" autocomplete="email"
                onkeydown="if(event.key==='Enter') document.getElementById('pass-input').focus()">
        </div>
        <div class="field">
            <label for="pass-input">Password</label>
            <input id="pass-input" type="password" placeholder="Your password" autocomplete="current-password"
                onkeydown="if(event.key==='Enter') login()">
        </div>
        <button class="primary" id="login-btn" onclick="login()">Sign In →</button>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('pass-input').value;
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';
            if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display = 'block'; return; }
            const btn = document.getElementById('login-btn');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.error) {
                    errEl.textContent = data.error;
                    errEl.style.display = 'block';
                    btn.disabled = false; btn.textContent = 'Sign In →';
                    return;
                }
                // Redirect to base path
                const basePath = window.location.pathname.replace(/\/login\.html$/, '');
                window.location.href = basePath === '' ? '/' : basePath + '/';
            } catch (e) {
                console.error("Login exception:", e);
                errEl.textContent = 'Network error: ' + (e.message || String(e));
                errEl.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Sign In →';
            }
        }
        document.getElementById('email-input').focus();
    </script>
</body>

</html>
