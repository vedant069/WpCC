<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp AI Engineer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap');

        :root {
            --pl-primary: #3249d7;
            --pl-primary-light: #6366f1;
            --pl-primary-dark: #1a1f71;
            --pl-accent: #818cf8;
            --pl-gradient: linear-gradient(135deg, #1a1f71 0%, #3249d7 40%, #6366f1 70%, #818cf8 100%);
        }

        body {
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Poppins', sans-serif;
        }

        /* Dark theme */
        [data-theme="dark"] body {
            background-color: #0c1029;
            color: #e2e8f0;
        }

        /* Light theme */
        [data-theme="light"] body {
            background-color: #f5f7fa;
            color: #1e293b;
        }

        .bg-glass {
            backdrop-filter: blur(10px);
        }

        /* Markdown Styles */
        .markdown-body {
            font-family: 'Open Sans', sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }

        [data-theme="dark"] .markdown-body {
            color: #cbd5e1;
        }

        [data-theme="light"] .markdown-body {
            color: #334155;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin-top: 1em;
            margin-bottom: 0.5em;
        }

        [data-theme="dark"] .markdown-body h1,
        [data-theme="dark"] .markdown-body h2,
        [data-theme="dark"] .markdown-body h3 {
            color: #f1f5f9;
        }

        [data-theme="light"] .markdown-body h1,
        [data-theme="light"] .markdown-body h2,
        [data-theme="light"] .markdown-body h3 {
            color: #0f172a;
        }

        .markdown-body p {
            margin-bottom: 0.75em;
        }

        .markdown-body ul {
            list-style-type: disc;
            padding-left: 1.5em;
            margin-bottom: 0.75em;
        }

        .markdown-body ol {
            list-style-type: decimal;
            padding-left: 1.5em;
            margin-bottom: 0.75em;
        }

        .markdown-body pre {
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
            margin-top: 0.5em;
            margin-bottom: 1em;
        }

        [data-theme="dark"] .markdown-body pre {
            background-color: #0d1117;
            border: 1px solid #1e3a5f;
        }

        [data-theme="light"] .markdown-body pre {
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
        }

        .markdown-body code {
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: monospace;
        }

        [data-theme="dark"] .markdown-body code {
            background-color: rgba(50, 73, 215, 0.15);
            color: #818cf8;
        }

        [data-theme="light"] .markdown-body code {
            background-color: rgba(50, 73, 215, 0.08);
            color: #3249d7;
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
        }

        [data-theme="dark"] .markdown-body pre code {
            color: #e2e8f0;
        }

        [data-theme="light"] .markdown-body pre code {
            color: #334155;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--pl-primary);
            padding-left: 1em;
            margin-bottom: 0.75em;
            font-style: italic;
        }

        [data-theme="dark"] .markdown-body blockquote {
            color: #94a3b8;
        }

        [data-theme="light"] .markdown-body blockquote {
            color: #64748b;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        [data-theme="dark"] ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        [data-theme="light"] ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] ::-webkit-scrollbar-thumb {
            background: rgba(50, 73, 215, 0.4);
            border-radius: 4px;
        }

        [data-theme="light"] ::-webkit-scrollbar-thumb {
            background: rgba(50, 73, 215, 0.25);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(50, 73, 215, 0.6);
        }

        /* Status colors */
        .status-running {
            color: #34d399;
        }

        .status-completed {
            color: var(--pl-primary);
        }

        .status-stopped {
            color: #fbbf24;
        }

        .status-failed {
            color: #f87171;
        }

        /* Brand gradient background */
        .pl-gradient {
            background: var(--pl-gradient);
        }

        /* Theme toggle */
        .theme-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        [data-theme="dark"] .theme-toggle {
            background: #1e3a5f;
        }

        [data-theme="light"] .theme-toggle {
            background: #cbd5e1;
        }

        .theme-toggle-knob {
            position: absolute;
            top: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        [data-theme="dark"] .theme-toggle-knob {
            transform: translateX(22px);
            background: #818cf8;
        }

        [data-theme="light"] .theme-toggle-knob {
            transform: translateX(2px);
            background: #3249d7;
        }

        /* Mobile sidebar overlay */
        @media (max-width: 767px) {
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform 0.25s ease-in-out;
                width: 85vw;
                max-width: 360px;
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 40;
            }

            #sidebar-overlay.open {
                display: block;
            }

            body {
                overflow: auto !important;
            }
        }

        /* Themed utility classes */
        .t-header {
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        [data-theme="dark"] .t-header {
            background: #0e1538;
            border-color: #1e2d5a;
        }

        [data-theme="light"] .t-header {
            background: #ffffff;
            border-color: #e2e8f0;
        }

        [data-theme="dark"] .t-sidebar {
            background: #0c1029;
            border-color: #1e2d5a;
        }

        [data-theme="light"] .t-sidebar {
            background: #ffffff;
            border-color: #e2e8f0;
        }

        [data-theme="dark"] .t-main {
            background: #080d20;
        }

        [data-theme="light"] .t-main {
            background: #f0f4f8;
        }

        [data-theme="dark"] .t-card {
            background: #111836;
            border-color: #1e2d5a;
        }

        [data-theme="light"] .t-card {
            background: #ffffff;
            border-color: #e2e8f0;
        }

        [data-theme="dark"] .t-card-hover:hover {
            background: #162050;
        }

        [data-theme="light"] .t-card-hover:hover {
            background: #f1f5f9;
        }

        [data-theme="dark"] .t-text-primary {
            color: #f1f5f9;
        }

        [data-theme="light"] .t-text-primary {
            color: #0f172a;
        }

        [data-theme="dark"] .t-text-secondary {
            color: #94a3b8;
        }

        [data-theme="light"] .t-text-secondary {
            color: #64748b;
        }

        [data-theme="dark"] .t-text-muted {
            color: #475569;
        }

        [data-theme="light"] .t-text-muted {
            color: #94a3b8;
        }

        [data-theme="dark"] .t-input {
            background: #111836;
            border-color: #1e2d5a;
            color: #e2e8f0;
        }

        [data-theme="light"] .t-input {
            background: #ffffff;
            border-color: #cbd5e1;
            color: #1e293b;
        }

        [data-theme="dark"] .t-input-area-bg {
            background: linear-gradient(to top, #080d20 60%, transparent);
        }

        [data-theme="light"] .t-input-area-bg {
            background: linear-gradient(to top, #f0f4f8 60%, transparent);
        }

        [data-theme="dark"] .t-badge {
            background: rgba(50, 73, 215, 0.15);
        }

        [data-theme="light"] .t-badge {
            background: rgba(50, 73, 215, 0.08);
        }
    </style>
</head>

<body class="h-screen flex flex-col antialiased">
    <!-- Header -->
    <header class="t-header h-14 md:h-16 flex items-center px-3 md:px-6 border-b z-30 shrink-0 shadow-sm">
        <!-- Mobile menu button -->
        <button id="sidebar-toggle" onclick="toggleSidebar()"
            class="md:hidden mr-2 p-2 t-text-secondary hover:text-[#3249d7] rounded-md cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>
        <div class="flex items-center space-x-2 md:space-x-3 md:w-1/3 shrink-0">
            <div
                class="w-7 h-7 md:w-8 md:h-8 rounded-lg pl-gradient flex items-center justify-center shadow-lg shadow-[#3249d7]/20">
                <svg class="w-4 h-4 md:w-5 md:h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-base md:text-xl font-bold tracking-tight whitespace-nowrap"
                style="font-family: Poppins, sans-serif;">
                <span class="hidden sm:inline"
                    style="background: var(--pl-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">WhatsApp
                    AI Engineer</span>
                <span class="sm:hidden"
                    style="background: var(--pl-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">WA
                    Engineer</span>
            </h1>
        </div>
        <div class="hidden md:flex flex-1 justify-center text-sm font-medium space-x-8 t-text-secondary">
            <div class="flex flex-col items-center"><span
                    class="t-text-muted text-[10px] uppercase tracking-wider font-bold">Total Sessions</span><span
                    id="stat-total" class="t-text-primary text-lg font-mono">...</span></div>
            <div class="flex flex-col items-center"><span
                    class="t-text-muted text-[10px] uppercase tracking-wider font-bold">Active</span><span
                    id="stat-active" class="text-[#3249d7] text-lg font-mono">...</span></div>
            <div class="flex flex-col items-center"><span
                    class="t-text-muted text-[10px] uppercase tracking-wider font-bold">API Cost</span><span
                    id="stat-cost" class="t-text-primary text-lg font-mono">...</span></div>
        </div>
        <!-- Mobile stats (compact) -->
        <div class="flex md:hidden flex-1 justify-center space-x-4 text-xs font-medium t-text-secondary">
            <span id="stat-active-mobile" class="text-[#3249d7] font-mono"></span>
            <span id="stat-cost-mobile" class="t-text-primary font-mono"></span>
        </div>
        <div class="shrink-0 flex items-center space-x-3 md:w-1/3 justify-end">
            <!-- Theme Toggle -->
            <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <div class="theme-toggle-knob"></div>
            </div>
            <select id="user-phone"
                class="t-input border rounded-md text-xs md:text-sm px-2 md:px-3 py-1 md:py-1.5 focus:ring-1 focus:ring-[#3249d7] outline-none max-w-[120px] md:max-w-none cursor-pointer">
                <option value="919970870091">Dev 1</option>
                <option value="917304556268">Dev 2</option>
            </select>
        </div>
    </header>

    <!-- App Body (Two Columns) -->
    <div class="flex-1 flex overflow-hidden relative">

        <!-- Mobile sidebar overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Left Pane: Sidebar / Session List -->
        <aside id="sidebar" class="w-80 md:w-96 flex flex-col border-r t-sidebar z-20 shadow-xl shadow-black/20">
            <div class="p-4 border-b flex justify-between items-center t-header shadow-sm z-10"
                style="border-color: inherit;">
                <h2 class="text-xs uppercase tracking-widest font-bold t-text-muted"
                    style="font-family: Poppins, sans-serif;">Session History</h2>
                <button onclick="startNewSessionView()"
                    class="text-[#3249d7] hover:text-white bg-[#3249d7]/10 hover:bg-[#3249d7] px-3 py-1.5 rounded-md flex items-center text-xs font-semibold transition-all border border-[#3249d7]/20 hover:border-[#3249d7] cursor-pointer">
                    <svg class="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    New Task
                </button>
            </div>

            <div class="flex-1 overflow-y-auto w-full" id="sessions-list">
                <!-- Session items listed here -->
                <div class="p-8 text-center t-text-muted">
                    <svg class="animate-spin w-6 h-6 mx-auto mb-3 opacity-50" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25">
                        </circle>
                        <path fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" class="opacity-75"></path>
                    </svg>
                    Loading sessions...
                </div>
            </div>

            <div class="p-3 border-t flex justify-between items-center t-header text-xs" id="pagination-controls"
                style="border-color: inherit;">
                <!-- Pagination -->
            </div>
        </aside>

        <!-- Right Pane: Active View Workspace -->
        <main class="flex-1 relative t-main flex flex-col h-full items-center justify-center" id="main-area">

            <!-- Default Empty State -->
            <div id="empty-state"
                class="absolute inset-0 flex flex-col items-center justify-center t-text-secondary z-0 t-main">
                <div class="w-20 h-20 rounded-full t-card flex items-center justify-center mb-6 shadow-2xl border">
                    <svg class="w-10 h-10 t-text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-xl font-medium t-text-primary mb-2" style="font-family: Poppins, sans-serif;">No Session
                    Selected</h2>
                <p class="text-sm t-text-secondary">Select a session from the history or start a new task.</p>
                <button onclick="startNewSessionView()"
                    class="mt-8 px-6 py-2.5 bg-[#3249d7] hover:bg-[#2a3dbf] text-white font-medium rounded-lg shadow-lg shadow-[#3249d7]/30 transition-colors cursor-pointer">
                    Start New Task
                </button>
            </div>

            <!-- Workspace Top Bar -->
            <div id="workspace-header"
                class="absolute top-0 left-0 right-0 h-12 md:h-14 px-3 md:px-6 border-b flex items-center justify-between t-header backdrop-blur-md z-20 hidden shadow-sm">
                <div class="flex items-center space-x-2 md:space-x-4 w-full min-w-0">
                    <span id="workspace-status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-500 shrink-0"></span>
                    <h2 id="workspace-title" class="font-semibold t-text-primary truncate flex-1 text-xs md:text-base"
                        style="font-family: Poppins, sans-serif;"></h2>
                    <span id="workspace-id"
                        class="text-[10px] md:text-xs font-mono font-medium t-text-secondary t-badge px-1.5 md:px-2.5 py-0.5 md:py-1 rounded border shrink-0 hidden sm:inline-block"
                        style="border-color: rgba(50,73,215,0.2);"></span>
                </div>
            </div>

            <!-- Logs / Chat Area -->
            <div id="workspace-content"
                class="absolute inset-0 overflow-y-auto px-3 md:px-8 pt-16 md:pt-20 pb-36 md:pb-40 hidden scroll-smooth w-full">
                <!-- Generated content injected here -->
            </div>

            <!-- Sticky Input Area -->
            <div id="workspace-input-area"
                class="absolute bottom-0 left-0 right-0 p-3 md:p-6 t-input-area-bg pt-6 md:pt-12 z-30 hidden pointer-events-none">
                <div
                    class="max-w-4xl mx-auto relative rounded-xl shadow-2xl t-card pointer-events-auto border focus-within:border-[#3249d7]/50 focus-within:ring-2 focus-within:ring-[#3249d7]/20 transition-all">
                    <textarea id="chat-textarea" rows="1" placeholder="Type a message..."
                        class="w-full bg-transparent px-3 md:px-5 py-3 md:py-4 pr-12 md:pr-14 resize-none outline-none overflow-y-auto max-h-36 md:max-h-48 leading-relaxed font-medium text-sm md:text-base t-text-primary"
                        style="color: inherit;"></textarea>

                    <button id="chat-send-btn"
                        class="absolute right-2 md:right-3 bottom-2 md:bottom-2.5 p-2 bg-[#3249d7] hover:bg-[#2a3dbf] text-white rounded-lg transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer">
                        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8">
                            </path>
                        </svg>
                    </button>
                </div>
                <div class="max-w-4xl mx-auto mt-2 text-center pointer-events-auto">
                    <span
                        class="text-[10px] font-medium t-text-muted uppercase tracking-widest hidden sm:inline-block t-badge px-3 py-1 rounded-full border"
                        style="border-color: rgba(50,73,215,0.15);">Shift + Enter for newline. Press Enter to
                        send.</span>
                </div>
            </div>

        </main>
    </div>

    <script>
        let currentSessionId = null;
        let isCreatingNew = false;
        let loopInterval = null;

        // Theme Management
        function getTheme() {
            return localStorage.getItem('pl-theme') || 'dark';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('pl-theme', theme);
        }

        function toggleTheme() {
            const current = getTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        // Apply saved theme on load
        setTheme(getTheme());

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
        }

        // Marked.js Configuration
        marked.setOptions({ breaks: true, gfm: true });

        // Auto-resize textarea
        const textarea = document.getElementById('chat-textarea');
        const sendBtn = document.getElementById('chat-send-btn');

        textarea.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value === '') this.style.height = 'auto';
            sendBtn.disabled = this.value.trim().length === 0;
        });

        textarea.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) sendMessage();
            }
        });

        sendBtn.addEventListener('click', () => {
            if (!sendBtn.disabled) sendMessage();
        });

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('stat-cost').innerText = `$${data.totalCost.toFixed(4)}`;
                document.getElementById('stat-active').innerText = data.activeCount;
                document.getElementById('stat-total').innerText = data.totalSessions;
                document.getElementById('stat-active-mobile').innerText = `${data.activeCount} active`;
                document.getElementById('stat-cost-mobile').innerText = `$${data.totalCost.toFixed(2)}`;
            } catch (err) { }
        }

        async function fetchSessions(page = 1) {
            try {
                const res = await fetch(`/api/sessions?page=${page}&limit=15`);
                const data = await res.json();

                const list = document.getElementById('sessions-list');
                list.innerHTML = '';

                if (page === 1 && data.sessions.length > 0 && !isCreatingNew) {
                    window._lastKnownTopSession = data.sessions[0].id;
                }

                if (data.sessions.length === 0) {
                    list.innerHTML = '<div class="p-8 text-center t-text-muted text-sm">No sessions yet.</div>';
                }

                data.sessions.forEach(s => {
                    const div = document.createElement('div');
                    const isActive = s.id === currentSessionId;

                    div.className = `p-4 border-b cursor-pointer transition-all t-card-hover group relative overflow-hidden ${isActive ? 't-card' : ''}`;
                    div.style.borderColor = 'inherit';

                    // Active indicator bar
                    if (isActive) {
                        const activeBar = document.createElement('div');
                        activeBar.className = 'absolute left-0 top-0 bottom-0 w-1 shadow-[0_0_10px_rgba(50,73,215,0.5)]';
                        activeBar.style.background = 'var(--pl-primary)';
                        div.appendChild(activeBar);
                    }

                    const time = new Date(s.updated_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const statusColor = s.status === 'running' ? 'text-emerald-400' : (s.status === 'failed' ? 'text-red-400' : 't-text-muted');

                    div.innerHTML += `
                        <div class="flex justify-between items-center mb-1.5 ml-1">
                            <span class="text-[11px] font-mono font-medium t-text-secondary transition-colors">${s.id.substring(0, 12)}...</span>
                            <span class="text-[9px] uppercase font-bold tracking-wider px-1.5 py-0.5 rounded-sm t-badge ${statusColor}">${s.status}</span>
                        </div>
                        <div class="text-[13px] font-medium t-text-primary line-clamp-2 leading-relaxed mb-2.5 ml-1 select-none">
                            ${escapeHtml(s.task) || '<span class="italic opacity-50 t-text-muted">No task description</span>'}
                        </div>
                        <div class="flex justify-between items-center text-xs t-text-muted ml-1 font-medium">
                            <span class="${s.cost_usd > 0 ? 'text-[#3249d7]' : ''}">\$${(s.cost_usd || 0).toFixed(4)}</span>
                            <span>${time}</span>
                        </div>
                    `;
                    div.onclick = () => { closeSidebar(); loadSession(s.id, s.task, s.status); };
                    list.appendChild(div);
                });

                // Pagination
                const pag = document.getElementById('pagination-controls');
                pag.innerHTML = `
                    <button onclick="fetchSessions(${data.page - 1})" ${data.page <= 1 ? 'disabled class="opacity-30"' : 'class="hover:text-[#3249d7] t-text-secondary transition-colors cursor-pointer"'}><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
                    <span class="font-medium t-text-secondary">Page ${data.page} / ${data.totalPages}</span>
                    <button onclick="fetchSessions(${data.page + 1})" ${data.page >= data.totalPages ? 'disabled class="opacity-30"' : 'class="hover:text-[#3249d7] t-text-secondary transition-colors cursor-pointer"'}><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
                `;
            } catch (err) { }
        }

        function startNewSessionView() {
            closeSidebar();
            currentSessionId = null;
            isCreatingNew = true;

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('workspace-header').classList.remove('hidden');
            document.getElementById('workspace-content').classList.remove('hidden');
            document.getElementById('workspace-input-area').classList.remove('hidden');

            document.getElementById('workspace-title').innerText = "Create New Session";
            document.getElementById('workspace-title').style.color = '#3249d7';
            document.getElementById('workspace-id').innerText = "NEW";
            document.getElementById('workspace-status-dot').className = "w-2.5 h-2.5 rounded-full animate-pulse shadow-[0_0_8px_rgba(50,73,215,0.6)]";
            document.getElementById('workspace-status-dot').style.background = '#3249d7';

            const content = document.getElementById('workspace-content');
            content.innerHTML = `
                <div class="max-w-3xl mx-auto py-12 md:py-24 text-center px-4 animate-[fadeIn_0.5s_ease-out]">
                    <div class="w-20 h-20 rounded-3xl mx-auto flex items-center justify-center mb-8 border shadow-2xl" style="background: rgba(50,73,215,0.1); border-color: rgba(50,73,215,0.2); box-shadow: 0 25px 50px rgba(50,73,215,0.1); color: #3249d7;">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    </div>
                    <h2 class="text-3xl font-bold t-text-primary mb-4 tracking-tight" style="font-family: Poppins, sans-serif;">Let's build something.</h2>
                    <p class="t-text-secondary text-lg max-w-xl mx-auto leading-relaxed">Describe your feature or bug fix. Gemini will plan it, spawn a Claude Code session, and execute the changes on the server.</p>
                </div>
            `;

            textarea.value = '';
            textarea.disabled = false;
            sendBtn.disabled = true;
            textarea.style.height = 'auto';
            textarea.focus();

            if (loopInterval) clearInterval(loopInterval);
            fetchSessions(1);
        }

        async function loadSession(id, taskTitle, status) {
            currentSessionId = id;
            isCreatingNew = false;

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('workspace-header').classList.remove('hidden');
            document.getElementById('workspace-content').classList.remove('hidden');
            document.getElementById('workspace-input-area').classList.remove('hidden');

            document.getElementById('workspace-title').innerText = taskTitle || 'Session Details';
            document.getElementById('workspace-title').style.color = '';
            document.getElementById('workspace-id').innerText = id;

            let color = '#64748b';
            let shadow = '';
            let pulse = '';
            if (status === 'running') {
                color = '#34d399';
                pulse = 'animate-pulse';
                shadow = 'shadow-[0_0_10px_rgba(52,211,153,0.5)]';
            } else if (status === 'failed') {
                color = '#f87171';
            } else if (status === 'completed') {
                color = '#3249d7';
            }
            const dot = document.getElementById('workspace-status-dot');
            dot.className = `w-2.5 h-2.5 rounded-full ${pulse} ${shadow}`;
            dot.style.background = color;

            const content = document.getElementById('workspace-content');
            content.innerHTML = `
                <div class="text-center t-text-muted mt-32 flex flex-col items-center">
                    <svg class="w-6 h-6 animate-spin mb-4" style="color: rgba(50,73,215,0.5);" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" class="opacity-25"></circle><path fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" class="opacity-75"></path></svg>
                    <span class="text-sm font-medium tracking-wide uppercase">Parsing Logs...</span>
                </div>
            `;

            fetchSessions(1);
            await pollMessages();

            if (loopInterval) clearInterval(loopInterval);
            loopInterval = setInterval(pollMessages, 3000);

            textarea.disabled = false;
            textarea.value = '';
            sendBtn.disabled = true;
            textarea.style.height = 'auto';
        }

        let isPollingMessages = false;
        async function pollMessages() {
            if (!currentSessionId || isPollingMessages) return;
            isPollingMessages = true;
            try {
                const res = await fetch(`/api/sessions/${currentSessionId}/messages`);
                const messages = await res.json();
                renderMessages(messages);
            } catch (err) {
                console.error("Polling error", err);
            } finally {
                isPollingMessages = false;
            }
        }

        let lastMessageCount = 0;
        function renderMessages(messages) {
            const content = document.getElementById('workspace-content');

            if (messages.length === lastMessageCount && content.querySelector('.max-w-4xl')) return;
            lastMessageCount = messages.length;

            if (messages.length === 0) {
                content.innerHTML = `
                    <div class="max-w-3xl mx-auto py-24 text-center px-4">
                        <div class="w-16 h-16 t-card rounded-2xl mx-auto flex items-center justify-center mb-6 border">
                            <svg class="w-8 h-8 t-text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <h2 class="text-lg font-medium t-text-primary mb-2" style="font-family: Poppins, sans-serif;">No logs found.</h2>
                        <p class="t-text-secondary text-sm">The session has started but no output has been recorded yet.</p>
                    </div>
                `;
                return;
            }

            const isAtBottom = content.scrollHeight - content.scrollTop <= content.clientHeight + 100;
            content.innerHTML = '';

            const maxW = document.createElement('div');
            maxW.className = "max-w-4xl mx-auto space-y-6";
            content.appendChild(maxW);

            messages.forEach((msg, index) => {
                const isUser = msg.role === 'user';
                const div = document.createElement('div');
                div.className = `flex flex-col w-full ${isUser ? 'items-end' : 'items-start'}`;

                const inner = document.createElement('div');

                if (isUser) {
                    inner.className = 'max-w-[85%] md:max-w-[70%] rounded-2xl px-5 py-3.5 text-white shadow-md break-words';
                    inner.style.background = 'var(--pl-primary)';
                    inner.style.boxShadow = '0 4px 14px rgba(50,73,215,0.25)';
                    const textBody = document.createElement('div');
                    textBody.className = 'whitespace-pre-wrap font-medium text-[15px] leading-relaxed';
                    textBody.textContent = msg.content;
                    inner.appendChild(textBody);
                } else {
                    inner.className = 'w-full max-w-[95%] md:max-w-[90%] bg-transparent py-2';

                    const header = document.createElement('div');
                    header.className = 'flex items-center space-x-2 mb-3';
                    header.innerHTML = `
                        <div class="w-6 h-6 rounded t-card border flex items-center justify-center shrink-0 shadow-sm">
                            <svg class="w-3.5 h-3.5" style="color: #3249d7;" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                        </div>
                        <span class="text-xs font-semibold t-text-secondary">Claude Code</span>
                    `;
                    inner.appendChild(header);

                    const textBody = document.createElement('div');
                    textBody.className = 'markdown-body pl-8';
                    textBody.innerHTML = marked.parse(msg.content);
                    inner.appendChild(textBody);
                }

                div.appendChild(inner);
                maxW.appendChild(div);
            });

            if (isAtBottom) {
                setTimeout(() => {
                    content.scrollTo({ top: content.scrollHeight, behavior: 'auto' });
                }, 50);
            }
        }

        async function sendMessage() {
            const val = textarea.value.trim();
            if (!val) return;

            const phone = document.getElementById('user-phone').value;
            textarea.value = '';
            textarea.style.height = 'auto';
            textarea.disabled = true;
            sendBtn.disabled = true;

            try {
                if (isCreatingNew) {
                    document.getElementById('workspace-content').innerHTML = `
                        <div class="max-w-3xl mx-auto py-24 text-center px-4">
                            <div class="inline-flex space-x-2 items-center px-5 py-2.5 rounded-full mb-6 border shadow-inner" style="color: #3249d7; background: rgba(50,73,215,0.1); border-color: rgba(50,73,215,0.2);">
                                <svg class="animate-spin w-4 h-4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25" fill="none"></circle><path fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" class="opacity-75"></path></svg>
                                <span class="text-sm font-semibold tracking-wide">Orchestrator dispatching...</span>
                            </div>
                            <h2 class="text-xl font-semibold t-text-primary mb-2" style="font-family: Poppins, sans-serif;">Analyzing your task</h2>
                            <p class="t-text-secondary text-sm">Please wait while Gemini spawns a Claude engine wrapper...</p>
                        </div>
                    `;

                    const resAPI = await fetch('/api/sessions/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone, text: val })
                    });
                    const result = await resAPI.json();

                    if (result.sessionId) {
                        isCreatingNew = false;
                        // Pre-emptively load the session by ID even if it hasn't loaded in fetchSessions yet
                        loadSession(result.sessionId, val, 'running');
                        fetchSessions(1);
                        pollMessages();
                    } else {
                        // Fallback if orchestrator didn't return an ID for some reason
                        setTimeout(() => {
                            isCreatingNew = false;
                            fetchSessions(1);
                        }, 2000);
                    }

                } else if (currentSessionId) {
                    const content = document.getElementById('workspace-content');
                    const maxW = content.querySelector('.max-w-4xl');
                    if (maxW) {
                        const div = document.createElement('div');
                        div.className = "flex flex-col w-full items-end opacity-70 animate-[slideUp_0.2s_ease-out]";
                        div.innerHTML = `<div class="max-w-[85%] md:max-w-[70%] rounded-2xl px-5 py-3.5 text-white shadow-md break-words" style="background: var(--pl-primary); box-shadow: 0 4px 14px rgba(50,73,215,0.25);"><div class="whitespace-pre-wrap font-medium text-[15px] leading-relaxed">${escapeHtml(val)}</div></div>`;
                        maxW.appendChild(div);
                        content.scrollTo({ top: content.scrollHeight, behavior: 'smooth' });
                    }

                    await fetch(`/api/sessions/${currentSessionId}/message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone, text: `[resume ${currentSessionId}] ${val}` })
                    });

                    pollMessages();
                }
            } catch (e) {
                alert("Network error: " + e.message);
            } finally {
                textarea.disabled = false;
                textarea.focus();
            }
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // CSS animations
        const animStyle = document.createElement('style');
        animStyle.innerHTML = `
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 0.7; transform: translateY(0); } }
        `;
        document.head.appendChild(animStyle);

        // Core Init
        fetchStats();
        fetchSessions(1);
        setInterval(fetchStats, 10000);
        setInterval(() => fetchSessions(1), 10000);
    </script>
</body>

</html>
